<!DOCTYPE html>
<html lang="en" th:replace="~{/site/layout/main :: dynamic(~{::main})}">
<head>
    <meta charset="UTF-8">
    <title>Đặt sân cầu lông</title>
  <style>
    .slot {
      padding: 10px 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    /* trống */
    .slot.free {
      background: #dcfce7;
      color: #166534;
    }
    .slot.free:hover {
      background: #22c55e;
      color: white;
    }

    /* đã đặt */
    .slot.booked {
      background: #fecaca;
      color: #991b1b;
      cursor: not-allowed;
    }

    /* đang chọn */
    .slot.active {
      background: #fde68a;
      color: #92400e;
    }
  </style>
</head>
<body>
<div th:fragment="main" class="flex flex-col lg:flex-row gap-6 h-[80vh]">
  <div class="max-w-6xl mx-auto px-4 py-6">

    <!-- CARD -->
    <div class="bg-white rounded-2xl shadow p-6">

      <!-- HEADER -->
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
        <h2 class="text-xl font-semibold">Đặt sân cầu lông</h2>

        <!-- chọn ngày -->
        <input type="date"
               class="border px-4 py-2 rounded-lg text-sm">
      </div>

      <!-- TIME HEADER -->
      <div class="grid grid-cols-7 text-center text-gray-500 text-sm mb-3">
        <div></div>
        <div>17:00</div>
        <div>18:00</div>
        <div>19:00</div>
        <div>20:00</div>
        <div>21:00</div>
        <div>22:00</div>
      </div>

      <!-- DANH SÁCH SÂN -->
      <div class="space-y-3">

        <!-- SÂN -->
        <div class="grid grid-cols-7 gap-2 items-center">
          <div class="font-medium">Sân 1</div>

          <button class="slot free">Trống</button>
          <button class="slot booked">Đã đặt</button>
          <button class="slot free">Trống</button>
          <button class="slot free">Trống</button>
          <button class="slot booked">Đã đặt</button>
          <button class="slot free">Trống</button>
        </div>

        <div class="grid grid-cols-7 gap-2 items-center">
          <div class="font-medium">Sân 2</div>

          <button class="slot free">Trống</button>
          <button class="slot free">Trống</button>
          <button class="slot booked">Đã đặt</button>
          <button class="slot free">Trống</button>
          <button class="slot free">Trống</button>
          <button class="slot booked">Đã đặt</button>
        </div>

      </div>

      <!-- CHÚ THÍCH -->
      <div class="flex gap-4 mt-6 text-sm text-gray-600">
            <span class="flex items-center gap-1">
                <div class="w-3 h-3 bg-green-400 rounded"></div> Trống
            </span>
        <span class="flex items-center gap-1">
                <div class="w-3 h-3 bg-red-400 rounded"></div> Đã đặt
            </span>
        <span class="flex items-center gap-1">
                <div class="w-3 h-3 bg-yellow-400 rounded"></div> Đang chọn
            </span>
      </div>

      <!-- FOOTER -->
      <div class="mt-6 flex justify-between items-center">

        <div class="text-sm">
          Đã chọn: <span id="selectedSlots">0</span> giờ
        </div>

        <button class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-600">
          Đặt sân
        </button>

      </div>

    </div>
  </div>


</div>
<script>
  let selected = []

  document.querySelectorAll('.slot.free').forEach(btn => {
    btn.onclick = () => {

      btn.classList.toggle('active')

      if (btn.classList.contains('active')) {
        btn.innerText = "Đang chọn"
        selected.push(btn)
      } else {
        btn.innerText = "Trống"
        selected = selected.filter(b => b !== btn)
      }

      document.getElementById('selectedSlots').innerText = selected.length
    }
  })
</script>
</body>
</html>
