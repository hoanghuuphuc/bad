<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - 🏸 Giao lưu Cầu Lông</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#1E40AF',
                    }
                }
            }
        }
    </script>
    <style>
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center py-12 px-4">
<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 md:p-12 border border-gray-100">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <span class="text-3xl">🏸</span>
        </div>
        <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent mb-2">
            Đăng nhập
        </h1>
        <p class="text-gray-500">Chào mừng trở lại với cộng đồng cầu lông!</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-6" th:action="@{/auth/signin}" method="post">
        <!-- Username -->
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Tài khoản</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    minlength="3"
                    placeholder="Nhập tài khoản hoặc email"
                    class="w-full px-4 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-primary/20 focus:border-primary text-lg transition duration-200"
            >
            <p id="usernameError" class="mt-1 text-sm text-red-500 hidden">Tài khoản phải có ít nhất 3 ký tự</p>
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="6"
                    placeholder="Nhập mật khẩu"
                    class="w-full px-4 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-primary/20 focus:border-primary text-lg transition duration-200"
            >
            <p id="passwordError" class="mt-1 text-sm text-red-500 hidden">Mật khẩu phải có ít nhất 6 ký tự</p>
        </div>

        <!-- Remember & Forgot -->
        <div class="flex items-center justify-between">
            <label class="flex items-center">
                <input type="checkbox" name="remember" class="rounded border-gray-300 text-primary focus:ring-primary h-5 w-5">
                <span class="ml-2 text-sm text-gray-600">Ghi nhớ đăng nhập</span>
            </label>
            <a href="#" class="text-sm text-primary hover:text-secondary font-medium">Quên mật khẩu?</a>
        </div>

        <!-- Login Button -->
        <button
                type="submit"
                id="loginBtn"
                class="w-full bg-gradient-to-r from-primary to-secondary text-white py-4 px-8 rounded-2xl font-semibold text-lg shadow-xl hover:shadow-2xl hover:from-secondary hover:to-primary transform hover:-translate-y-1 transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-primary/50"
        >
            Đăng nhập
        </button>
    </form>
    <a href="/oauth2/authorization/google">
    <button
            type="submit"
            id="loginBtn"
            class="w-full bg-gradient-to-r from-primary to-secondary text-white py-4 px-8 rounded-2xl font-semibold text-lg shadow-xl hover:shadow-2xl hover:from-secondary hover:to-primary transform hover:-translate-y-1 transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-primary/50"
    >
        Đăng nhập Google
    </button>
    </a>
    <!-- Register Link -->
    <div class="text-center mt-8 pt-8 border-t border-gray-100">
        <p class="text-sm text-gray-600 mb-4">Chưa có tài khoản?</p>
        <a href="register.html" class="inline-flex items-center text-primary hover:text-secondary font-semibold text-lg group">
            Đăng ký ngay
            <svg class="ml-1 w-5 h-5 group-hover:translate-x-1 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
            </svg>
        </a>
    </div>

    <!-- Demo Credentials -->

</div>


</body>
</html>
