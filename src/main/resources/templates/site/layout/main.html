<!DOCTYPE html>
<html lang="en" th:fragment="dynamic(main)">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏸 Giao lưu Cầu Lông</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        .border-left-primary { border-left-color: #3B82F6; }
        .border-left-success { border-left-color: #10B981; }
        .card-hover:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 25px 50px -12px rgba(0, 0,0, 0.25); 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.18); 
        }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(156,163,175,0.5); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(156,163,175,0.8); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#1E40AF',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 via-white to-emerald-50 min-h-screen flex flex-col">

<header th:replace="~{/site/fragments/header.html}"></header>

<main th:replace="${main}" class="flex-1 px-6 lg:px-8 xl:px-16 flex flex-col overflow-y-auto scrollbar-thin">
</main>
    
<!--    <footer th:replace="~{/site/fragments/footer.html}" class="flex-none border-t border-gray-200/50 shadow-sm bg-white/90 backdrop-blur py-4 px-6 lg:px-8"></footer>-->
    
    <script src="/js/script.js"></script>
</body>
</html>
